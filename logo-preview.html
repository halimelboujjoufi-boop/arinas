<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #f5f5f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; font-family: Arial; }
  .box { background: white; padding: 40px 60px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .box-dark { background: #1a1a1a; padding: 40px 60px; border-radius: 12px; }
  h3 { color: #888; font-size: 12px; letter-spacing: 3px; margin-bottom: 20px; }
</style>
</head>
<body>
  <div class="box">
    <h3>على خلفية بيضاء</h3>
    <img src="decodes-logo.svg" width="400">
  </div>
  <div class="box-dark">
    <h3 style="color:#555">على خلفية داكنة</h3>
    <img src="decodes-logo.svg" width="400">
  </div>
  <div class="box" style="background:#f9f0f0">
    <h3>حجم صغير (header)</h3>
    <img src="decodes-logo.svg" width="200">
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>ARINAS</title>
    <style>
      html, body {
        margin: 0; height: 100%;
        background: #0A0A0A; color: #F5F2EC;
        font-family: "Cormorant Garamond", "Times New Roman", serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; }
      .logo { font-size: 34px; letter-spacing: 0.5em; font-weight: 300; padding-left: 0.5em; }
      .bar { width: 120px; height: 1px; background: rgba(245,242,236,0.15); overflow: hidden; position: relative; }
      .bar::after { content: ""; position: absolute; inset: 0; width: 40%; background: #B89A6A; animation: slide 1.2s ease-in-out infinite; }
      @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
      .msg { font-family: "Inter", sans-serif; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(245,242,236,0.4); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">ARINAS</div>
      <div class="bar"></div>
      <div class="msg" id="msg">Loading</div>
    </div>
    <script>
      // The native shell loads https://arinas.ma. If it can't be reached,
      // this fallback offers a manual retry.
      setTimeout(function () {
        var m = document.getElementById("msg");
        if (m) {
          m.textContent = "Tap to retry";
          document.body.style.cursor = "pointer";
          document.body.onclick = function () { location.href = "https://arinas.ma"; };
        }
      }, 8000);
    </script>
  </body>
</html>
